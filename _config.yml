# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

lang: en
timezone: America/Los_Angeles

future: true

title: Circuit Break
tagline: Notes on building with AI coding agents

description: >-
  Techniques, tools, and lessons from building with AI coding agents.

url: "https://samfoy.github.io"
baseurl: "/circuit-break"

github:
  username: samfoy

twitter:
  username: samfoypainter

social:
  name: Sam Painter
  email: sam.foy.painter@gmail.com
  links:
    - https://x.com/samfoypainter
    - https://github.com/samfoy
    - https://www.linkedin.com/in/sam-painter-04248580

social_preview_image: /assets/img/social-preview.png

avatar: https://avatars.githubusercontent.com/u/590916?v=4

theme_mode: dark

toc: true

comments:
  provider: giscus
  giscus:
    repo: samfoy/circuit-break
    repo_id: R_kgDOSDpY4w
    category: General
    category_id: DIC_kwDOSDpY484C7N8Z
    mapping: pathname
    strict: 0
    input_position: top
    lang: en
    reactions_enabled: 1

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
